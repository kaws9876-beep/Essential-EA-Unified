name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify server.js is correct
        run: |
          node --check server.js
          echo "server.js syntax OK"
          wc -l server.js
          grep -q "automation/jobs" server.js && echo "Automation routes: OK" || echo "WARNING: automation routes missing"
          grep -q "api/health" server.js && echo "Health check: OK" || echo "WARNING: health check missing"
